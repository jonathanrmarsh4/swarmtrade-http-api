version: '3.8'

services:
  http-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MCP_ENDPOINT: http://localhost:3001
      CORS_ORIGINS: "*"
      LOG_LEVEL: debug
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Uncomment to also run MCP server in Docker
  # mcp-server:
  #   image: swarmtrade-mcp:latest
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     NODE_ENV: development
  #   restart: unless-stopped
